<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id ="primera">
            <a href="inicio.html">Inicio</a>
            <a href="registro.html">Registro</a>
            <a href="login.html">Iniciar sesion</a>
            <a href="catalogo.html">Catalogo</a>
            <a href="carrito.html">Carrito</a>
        
    </section>
    <form action="#" id="formulario">
        <h1>Crear cuenta nueva 🍰</h1>
        <div class="row">
            <label for="nombres">Nombres: </label>
            <input type="text" id="nombres"placeholder="Diego Rafael" required>
        </div>
        <div class="row">
            <label for="apellidos">Apellidos: </label>
            <input type="text" id="apellidos"placeholder="Flores Valdenegro"required>
        </div>
        <div class="row">
            <label for="direccion">Direccion: </label>
            <input type="text" id="direccion"placeholder="Padre Hurtado"required>
        </div>
        <div class="row">
            <label for="correo">Correo: </label>
            <input type="text" id="correo"placeholder="DiegoF@gmail.com"required>
        </div>
        <div class="row">
            <label for="contraseña">Contraseña: </label>
            <input type="password" id="contraseña"placeholder="contraseñacienporcientosegura"required>
        </div>
        <div class="row">
            <label for="confirmar">Confirmar contraseña: </label>
            <input type="password" id="confirmar"placeholder="contraseñacienporcientosegura"required>
        </div>
        <div class="row">
            <label for="edad">Edad: </label>
            <input type="number" id="edad" placeholder="28" min="0" max="150" maxlength="3" required>


        </div>
        <div class="row">
            <label for="codigo">Codigo de registro (solo si tiene alguno) </label>
            <input type="text" id="codigo"placeholder="CODIGODSCTO123">
        </div>

        <button type="reset">Limpiar</button>
        <button type="submit">Enviar</button>
        <p id="errores">&nbsp;</p>





    </form>
    <script src="function.js"></script>

    </script>
    
</body>
</html>
